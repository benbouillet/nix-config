modules:
  http_health_healthy:
    prober: http
    timeout: 5s
    http:
      valid_status_codes: [200]
      method: GET
      fail_if_body_not_matches_regexp:
        - "^Healthy$"

  http_health_version:
    prober: http
    timeout: 5s
    http:
      valid_status_codes: [200]
      method: GET
      fail_if_body_not_matches_regexp:
        - '(?m)^v\d+\.\d+.\d+(-[0-9A-Za-z-]+)?$'

  http_health_json:
    prober: http
    timeout: 5s
    http:
      valid_status_codes: [200]
      method: GET
      fail_if_header_not_matches:
        - header: content-type
          regexp: application/json
      fail_if_body_not_matches_regexp:
        - '"status": "OK"'
