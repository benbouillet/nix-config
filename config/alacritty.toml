live_config_reload = true

[env]
XTERM = "xterm-256color"
TERM = "alacritty"

[window]
dynamic_padding = false
opacity = 0.95
startup_mode = "Maximized"
dynamic_title = true

  [window.padding]
  x = 6
  y = 6

[scrolling]
history = 10_000
multiplier = 3

[font]
size = 15

  [font.normal]
  family = "FiraMono Nerd Font"
  style = "Regular"

  [font.bold]
  family = "FiraMono Nerd Font"
  style = "Bold"

  [font.italic]
  family = "FiraMono Nerd Font"
  style = "Italic"

  [font.bold_italic]
  family = "FiraMono Nerd Font"
  style = "Bold Italic"

[colors.primary]
background = "#2e3440"
foreground = "#d8dee9"
dim_foreground = "#a5abb6"

[colors.cursor]
text = "#2e3440"
cursor = "#d8dee9"

[colors.vi_mode_cursor]
text = "#2e3440"
cursor = "#d8dee9"

[colors.selection]
text = "CellForeground"
background = "#4c566a"

[colors.search.matches]
foreground = "CellBackground"
background = "#88c0d0"

[colors.footer_bar]
background = "#434c5e"
foreground = "#d8dee9"

[colors.normal]
black = "#3b4252"
red = "#bf616a"
green = "#a3be8c"
yellow = "#ebcb8b"
blue = "#81a1c1"
magenta = "#b48ead"
cyan = "#88c0d0"
white = "#e5e9f0"

[colors.bright]
black = "#4c566a"
red = "#bf616a"
green = "#a3be8c"
yellow = "#ebcb8b"
blue = "#81a1c1"
magenta = "#b48ead"
cyan = "#8fbcbb"
white = "#eceff4"

[colors.dim]
black = "#373e4d"
red = "#94545d"
green = "#809575"
yellow = "#b29e75"
blue = "#68809a"
magenta = "#8c738c"
cyan = "#6d96a5"
white = "#aeb3bb"

[bell]
animation = "EaseOutExpo"
duration = 300
color = "0xffffff"

[selection]
semantic_escape_chars = ",│`|:\"' ()[]{}<>\t"
save_to_clipboard = true

[cursor]
unfocused_hollow = true

  [cursor.style]
  shape = "Beam"

  [cursor.vi_mode_style]
  shape = "Block"

[mouse]
hide_when_typing = true
